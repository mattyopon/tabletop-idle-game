<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卓上冒険物語</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Title Bar -->
    <div class="titlebar" style="-webkit-app-region: drag;">
      <button id="btn-menu" class="titlebar-btn no-drag" style="-webkit-app-region: no-drag;">☰</button>
      <span class="titlebar-title">卓上冒険物語</span>
      <div class="titlebar-right">
        <button id="btn-minimize" class="titlebar-btn no-drag" style="-webkit-app-region: no-drag;">−</button>
        <button id="btn-close" class="titlebar-btn close no-drag" style="-webkit-app-region: no-drag;">×</button>
      </div>
      <div id="menu-dropdown" class="menu-dropdown" style="-webkit-app-region: no-drag;">
        <div id="menu-reset" class="menu-item">🔄 セーブリセット</div>
      </div>
    </div>

    <!-- Stage Header -->
    <div id="stage-header" class="stage-header">
      <span id="stage-name" class="stage-name">草原 1-1</span>
      <span id="stage-timer" class="stage-timer">⏱️ 0:00</span>
    </div>

    <!-- Battle Scene -->
    <div id="scene" class="scene grassland-bg" style="-webkit-app-region: no-drag;">
      <!-- Ground line -->
      <div class="ground-line"></div>

      <!-- Ally party (left side) -->
      <div id="ally-area" class="ally-area">
        <!-- Front row -->
        <div id="ally-front" class="ally-row front-row"></div>
        <!-- Back row -->
        <div id="ally-back" class="ally-row back-row"></div>
      </div>

      <!-- Enemy area (right side) -->
      <div id="enemy-area" class="enemy-area"></div>

      <!-- Effect layer -->
      <div id="effect-layer" class="effect-layer"></div>

      <!-- Battle log overlay (1 line at bottom) -->
      <div id="battle-log-overlay" class="battle-log-overlay"></div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="status-item">💰 <span id="stat-gold">0</span>G</span>
      <span class="status-item">⭐ Lv.<span id="stat-level">1</span></span>
      <div class="bar-container">
        <div class="bar-bg hp-bar-bg">
          <div id="hp-bar" class="bar-fill hp" style="width:100%"></div>
        </div>
        <div class="bar-bg exp-bar-bg">
          <div id="exp-bar" class="bar-fill exp" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Log Panel -->
    <div class="log-panel">
      <div id="log-content" class="log-content"></div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar" style="-webkit-app-region: no-drag;">
      <button class="tab-btn active no-drag" data-tab="adventure">⚔️冒険</button>
      <button class="tab-btn no-drag" data-tab="party">👥編成</button>
      <button class="tab-btn no-drag" data-tab="equip">🎒装備</button>
      <button class="tab-btn no-drag" data-tab="prestige">🔮転生</button>
    </div>

    <!-- Tab Content Area -->
    <div id="tab-content" class="tab-content" style="-webkit-app-region: no-drag;">
      <!-- Dynamically filled by game.js -->
    </div>
  </div>

  <script src="characters.js"></script>
  <script src="game.js"></script>
</body>
</html>
