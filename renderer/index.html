<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卓上冒険物語</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Title Bar -->
    <div class="titlebar" style="-webkit-app-region: drag;">
      <button id="btn-menu" class="titlebar-btn no-drag" style="-webkit-app-region: no-drag;">☰</button>
      <span class="titlebar-title">卓上冒険物語</span>
      <div class="titlebar-right">
        <button id="btn-minimize" class="titlebar-btn no-drag" style="-webkit-app-region: no-drag;">−</button>
        <button id="btn-close" class="titlebar-btn close no-drag" style="-webkit-app-region: no-drag;">×</button>
      </div>
      <div id="menu-dropdown" class="menu-dropdown" style="-webkit-app-region: no-drag;">
        <div id="menu-reset" class="menu-item">🔄 セーブリセット</div>
      </div>
    </div>

    <!-- Game Area (main content) -->
    <div class="game-area" style="-webkit-app-region: no-drag;">
      <!-- Left party sidebar -->
      <div id="party-sidebar" class="party-sidebar"></div>

      <!-- Main battle scene (center) -->
      <div id="scene" class="scene grassland-bg">
        <!-- Ground line -->
        <div class="ground-line"></div>

        <!-- Ally party (walks left to right) -->
        <div id="ally-area" class="ally-area">
          <div id="ally-party" class="ally-party-line"></div>
        </div>

        <!-- Enemy area (right side) -->
        <div id="enemy-area" class="enemy-area"></div>

        <!-- Effect layer -->
        <div id="effect-layer" class="effect-layer"></div>

        <!-- Battle log overlay (1 line at bottom of scene) -->
        <div id="battle-log-overlay" class="battle-log-overlay"></div>
      </div>

      <!-- Right info sidebar -->
      <div id="info-sidebar" class="info-sidebar">
        <div id="area-name" class="area-info-name"></div>
        <div id="wave-counter" class="wave-counter"></div>
        <div class="info-divider"></div>
        <div id="gold-display" class="gold-display"></div>
        <div class="info-divider"></div>
        <div id="timer-display" class="timer-display"></div>
        <div class="info-divider"></div>
        <div id="level-display" class="level-display"></div>
      </div>

      <!-- Popup overlay dim -->
      <div id="popup-overlay" class="popup-overlay" style="display:none"></div>

      <!-- Floating popup panel (hidden by default) -->
      <div id="popup-panel" class="popup-panel" style="display:none">
        <div class="popup-header">
          <span id="popup-title" class="popup-title-text"></span>
          <button id="popup-close" class="popup-close-btn">×</button>
        </div>
        <div id="popup-content" class="popup-content"></div>
      </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar" style="-webkit-app-region: no-drag;">
      <button class="tab-btn no-drag" data-tab="adventure">⚔️冒険</button>
      <button class="tab-btn no-drag" data-tab="party">👥編成</button>
      <button class="tab-btn no-drag" data-tab="equip">🎒装備</button>
      <button class="tab-btn no-drag" data-tab="prestige">🔮転生</button>
    </div>
  </div>

  <script src="characters.js"></script>
  <script src="game.js"></script>
</body>
</html>
